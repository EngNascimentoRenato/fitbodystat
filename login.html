<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#25636f" />
    <title>Entrar | FitBodyStat</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/forms.css" />
  </head>
  <body>
    <main class="login-page">
      <section class="login-panel card">
        <a class="brand" href="login.html" aria-label="FitBodyStat">
          <span class="brand-mark" aria-hidden="true">FBS</span>
          <span>
            <strong>FitBodyStat</strong>
            <small>peso, medidas e composição</small>
          </span>
        </a>

        <div class="login-grid">
          <form class="form" id="sign-in-form">
            <div>
              <h1>Entrar</h1>
              <p class="muted">Acesse sua conta para carregar seus dados salvos.</p>
            </div>
            <div class="field">
              <label for="login-email">E-mail</label>
              <input id="login-email" name="email" type="email" autocomplete="email" required />
            </div>
            <div class="field">
              <label for="login-password">Senha</label>
              <input id="login-password" name="password" type="password" autocomplete="current-password" required />
            </div>
            <div class="button-row">
              <button class="button primary" type="submit">Entrar</button>
              <button class="button" id="sign-in-google" type="button">Entrar com Google</button>
            </div>
          </form>

          <form class="form" id="create-account-form">
            <div>
              <h2>Criar conta</h2>
              <p class="muted">Use um e-mail e uma senha nova para iniciar um perfil em branco.</p>
            </div>
            <div class="field">
              <label for="create-email">E-mail</label>
              <input id="create-email" name="email" type="email" autocomplete="email" required />
            </div>
            <div class="field">
              <label for="create-password">Senha</label>
              <input id="create-password" name="password" type="password" autocomplete="new-password" required minlength="8" />
              <span class="help-text">Mínimo de 8 caracteres, com pelo menos uma letra e um número.</span>
            </div>
            <div class="field">
              <label for="confirm-password">Repetir senha</label>
              <input id="confirm-password" name="confirmPassword" type="password" autocomplete="new-password" required minlength="8" />
            </div>
            <div class="button-row">
              <button class="button primary" type="submit">Criar nova conta</button>
            </div>
          </form>
        </div>

        <p class="muted" id="login-status" aria-live="polite"></p>
      </section>
    </main>
    <script type="module" src="js/login.js"></script>
  </body>
</html>
