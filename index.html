<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#25636f" />
    <title>FitBodyStat</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/theme.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/forms.css" />
    <link rel="stylesheet" href="css/charts.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/activities.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Menu principal">
        <a class="brand" id="brand-home" href="#/dashboard" aria-label="Ir para a página inicial">
          <span class="brand-mark" aria-hidden="true">FBS</span>
          <span>
            <strong>FitBodyStat</strong>
            <small>peso, medidas e composição</small>
          </span>
        </a>
        <div class="sidebar-user" id="sidebar-user"></div>
        <nav class="nav-list" id="main-menu"></nav>
      </aside>

      <div class="main-shell">
        <div class="sticky-header">
          <header class="topbar">
            <button class="icon-button menu-toggle" id="menu-toggle" type="button" aria-label="Alternar menu">
              <span aria-hidden="true">☰</span>
            </button>
            <div class="topbar-title">
              <p class="eyebrow" id="route-eyebrow">Acompanhamento pessoal</p>
              <h1 id="route-title">Dashboard</h1>
            </div>
            <a class="button primary topbar-action" id="topbar-action" href="#/registro">Novo registro</a>
          </header>
          <div class="patient-context" id="patient-context" hidden></div>
        </div>

        <main class="content" id="app" tabindex="-1"></main>
      </div>
    </div>

    <div class="toast-region" id="toast-region" aria-live="polite" aria-atomic="true"></div>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
